<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-clone</title>
    <link rel="stylesheet" href="css.css">
    <link rel="stylesheet" href="fonts/css/font-awesome.min.css">
</head>
<body>
    <header> 
        <nav>
            <div class="container">
                <h1 class="logo">X-clone</h1>
                <ul>
                    <li href="index.html" class="active">
                        <i class="fa fa-home active" aria-hidden="true"></i>Главная
                    </li>
                    <li href="search.html">
                        <i class="fa fa-search" aria-hidden="true"></i>Поиск
                    </li>
                    <li href="profile.html">
                        <i class="fa fa-user" aria-hidden="true"></i>Профиль
                    </li>
                </ul>
            </div>
        </nav>
        <div class="post">
            <button>Создать публикацию</button>
            <div class="user">
                <div class="avatar">
                    <img src="images/ava1.webp" alt="ava">
                </div>
                <div class="username">
                    <div class="username">
                        <h4>Alex Rivera</h4>
                        <p>@username</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="index">
        <div class="subtitle">
            <div class="main-header">
                <h2>Главная</h2>
            </div>

            <div class="category">
                <div class="foru">
                    Для вас
                </div>
                <div class="follows">
                    Вы подписаны
                </div>
            </div>
        </div>

        <div class="happend">
            <div class="avatar">
                <img src="images/ava1.webp" alt="ava">
            </div>
            
            <input name="post" class="input" type="text" placeholder="Что происходит?">
            <i class="fa fa-file-image-o" aria-hidden="true"></i>
            <button>Пост</button>
        </div>

        <div class="publications">
            <>
    </main>
</body>
</html>
